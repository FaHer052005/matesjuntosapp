services:
  db:
    image: postgres:16-alpine
    container_name: matesjuntos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mates
      POSTGRES_PASSWORD: mates123
      POSTGRES_DB: matesjuntos
    ports:
      - "5432:5432"
    volumes:
      - mates_pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  mates_pg_data:
